# /etc/httpd/conf.d/upou-admin.conf
#
# Apache vhost for the UPOU HelpDesk Admin console.
# Runs on port 8080 so it coexists with the main helpdesk app on port 80.
#
# Requires /etc/httpd/conf/httpd.conf to have:  Listen 8080
# (or add it via a drop-in in /etc/httpd/conf.d/ports.conf)

Listen 8080

<VirtualHost *:8080>
    ServerName upou-admin.local
    DocumentRoot /var/www/upou-admin/public

    <Directory /var/www/upou-admin/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # ---- AWS configuration ----
    SetEnv AWS_REGION           us-east-1
    SetEnv DDB_TICKETS_TABLE    upou-helpdesk-tickets

    # ---- Database (separate DB from the main helpdesk app) ----
    SetEnv DB_HOST              127.0.0.1
    SetEnv DB_PORT              3306
    SetEnv DB_NAME              upou_admin
    SetEnv DB_USER              upou_admin_app
    SetEnv DB_PASS              CHANGE_ME_STRONG_PASSWORD

    SetEnv APP_DEBUG            false

    ErrorLog  /var/log/httpd/upou-admin-error.log
    CustomLog /var/log/httpd/upou-admin-access.log combined
</VirtualHost>
