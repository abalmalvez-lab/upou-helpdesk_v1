# /etc/httpd/conf.d/upou-helpdesk.conf
#
# Apache vhost for the UPOU AI HelpDesk PHP app.
# Document root points at php/public so includes/, vendor/, and views/
# stay above the web root and cannot be accessed directly from the browser.

<VirtualHost *:80>
    ServerName upou-helpdesk.local
    DocumentRoot /var/www/upou-helpdesk/php/public

    <Directory /var/www/upou-helpdesk/php/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # ---- Application configuration via environment variables ----
    # The PHP app reads these via getenv(). Edit the values to match your setup.
    SetEnv AWS_REGION             us-east-1
    SetEnv LAMBDA_FUNCTION_NAME   ai-webapp-handler
    SetEnv S3_BUCKET              your-bucket-name-here
    SetEnv S3_PREFIX              logs/

    SetEnv DB_HOST                127.0.0.1
    SetEnv DB_PORT                3306
    SetEnv DB_NAME                upou_helpdesk
    SetEnv DB_USER                upou_app
    SetEnv DB_PASS                CHANGE_ME_STRONG_PASSWORD

    SetEnv APP_DEBUG              false

    ErrorLog  /var/log/httpd/upou-helpdesk-error.log
    CustomLog /var/log/httpd/upou-helpdesk-access.log combined
</VirtualHost>
